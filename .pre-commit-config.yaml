repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-added-large-files
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
        stages: [commit, push, manual]
      - id: trailing-whitespace
        stages: [commit, push, manual]
  - repo: local
    hooks:
      - id: pydoclint
        name: pydoclint
        entry: pydoclint
        language: python
        additional_dependencies: ["pydoclint>=0.4.1,<0.5"]
        types: [python]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v2.6.0
    hooks:
      - id: prettier
